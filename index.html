<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Premium - Seu Painel de Controle Financeiro</title>
    <meta name="description"
        content="Controle suas finanças pessoais com um painel interativo de alto desempenho, gráficos de despesas detalhados e sincronização na nuvem com Supabase.">

    <!-- Estilos de Ícones Premium (Remix Icon) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="style.css">

    <!-- Bibliotecas Necessárias via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- ==========================================
         1. TELA DE LOGIN (Google OAuth / Modo Demo)
         ========================================== -->
    <main id="login-screen" style="display: flex;">
    <div class="login-card glass">
        <div class="login-header">
            <div class="login-icon"><i class="ri-wallet-3-fill"></i></div>
            <h1>Finanças Premium</h1>
            <p>Acesse sua conta para continuar</p>
        </div>

        <form id="login-form" class="login-options">
            <div class="input-group">
                <i class="ri-mail-line"></i>
                <input type="email" id="user-email" placeholder="E-mail" class="form-input" required>
            </div>
            <div class="input-group">
                <i class="ri-lock-line"></i>
                <input type="password" id="user-pass" placeholder="Senha" class="form-input" required>
            </div>

            <button type="submit" class="btn-primary" id="btn-login-real">
                Entrar <i class="ri-arrow-right-line" style="margin-left: 5px;"></i>
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <button type="button" id="btn-login-visitante" class="btn-secondary">
                <i class="ri-user-smile-line"></i> Acessar como Visitante
            </button>
        </form>
    </div>
</main>

    <!-- ==========================================
         2. TELA DO DASHBOARD FINANCEIRO
         ========================================== -->
    <main id="dashboard-screen" style="display: none;">

        <!-- Header Principal -->
        <header class="glass animate-fade">
            <div class="header-brand">
                <div class="header-brand-icon">
                    <i class="ri-safe-2-line"></i>
                </div>
                <div>
                    <h2>Finanças Premium</h2>
                    <span id="demo-badge" class="demo-badge" style="display: none;">Modo Teste</span>
                </div>
            </div>

            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema escuro/claro"
                    title="Alternar Tema">
                    <i class="ri-sun-line sun-icon"></i>
                    <i class="ri-moon-line moon-icon"></i>
                </button>

                <div class="user-profile">
                    <img id="user-avatar" class="user-avatar" src="" alt="Foto do usuário">
                    <div class="user-info">
                        <span id="user-name" class="user-name">Carregando...</span>
                    </div>
                    <button id="logout-btn" class="logout-btn" title="Encerrar Sessão" aria-label="Sair">
                        <i class="ri-logout-box-r-line"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Widgets de Resumo Financeiro -->
        <section class="summary-container animate-fade">
            <!-- Saldo Geral -->
            <div class="widget-card widget-balance glass">
                <div class="widget-icon">
                    <i class="ri-bank-card-line"></i>
                </div>
                <div class="widget-info">
                    <span class="widget-label">Saldo Geral</span>
                    <span id="val-balance" class="widget-value">R$ 0,00</span>
                </div>
            </div>

            <!-- Receitas (Entradas) -->
            <div class="widget-card widget-income glass">
                <div class="widget-icon">
                    <i class="ri-arrow-up-circle-line"></i>
                </div>
                <div class="widget-info">
                    <span class="widget-label">Receitas</span>
                    <span id="val-income" class="widget-value">R$ 0,00</span>
                </div>
            </div>

            <!-- Despesas (Saídas) -->
            <div class="widget-card widget-expense glass">
                <div class="widget-icon">
                    <i class="ri-arrow-down-circle-line"></i>
                </div>
                <div class="widget-info">
                    <span class="widget-label">Despesas</span>
                    <span id="val-expense" class="widget-value">R$ 0,00</span>
                </div>
            </div>
        </section>

        <!-- Seção de Análise e Gráficos -->
        <section class="charts-grid animate-fade">
            <!-- Gráfico de Despesas Mensais -->
            <div class="chart-card glass">
                <div class="chart-card-header">
                    <h3 class="chart-card-title">Evolução Mensal de Despesas</h3>
                    <i class="ri-bar-chart-fill" style="color: var(--primary);"></i>
                </div>
                <div class="chart-canvas-container">
                    <canvas id="monthlyExpensesChart"></canvas>
                </div>
            </div>

            <!-- Gráfico de Distribuição por Categoria -->
            <div class="chart-card glass">
                <div class="chart-card-header">
                    <h3 class="chart-card-title">Despesas por Categoria</h3>
                    <i class="ri-pie-chart-fill" style="color: var(--primary);"></i>
                </div>
                <div class="chart-canvas-container">
                    <canvas id="categoryExpensesChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Barra de Ações (Filtros, Busca e Cadastro) -->
        <section class="transactions-section animate-fade">
            <div class="transactions-toolbar">
                <div class="search-filter-box">
                    <div class="search-input-wrapper">
                        <i class="ri-search-line"></i>
                        <input id="search-input" class="search-input" type="text"
                            placeholder="Buscar por descrição ou categoria...">
                    </div>

                    <select id="filter-select" class="filter-select">
                        <option value="all">Todas as Transações</option>
                        <option value="income">Entradas (Receitas)</option>
                        <option value="expense">Saídas (Despesas)</option>
                    </select>
                </div>

                <button id="open-add-modal-btn" class="btn-primary">
                    <i class="ri-add-line"></i>
                    Nova Transação
                </button>
            </div>

            <!-- Histórico de Transações -->
            <div class="transactions-card glass">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Descrição</th>
                                <th>Valor</th>
                                <th>Categoria</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-tbody">
                            <!-- Inserido dinamicamente via JS -->
                        </tbody>
                    </table>
                </div>
                <!-- Lista Mobile -->
                <div id="mobile-transactions-list" class="mobile-transactions-list">
                    <!-- Inserido dinamicamente via JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- ==========================================
         3. MODAL: ADICIONAR NOVA TRANSAÇÃO
         ========================================== -->
    <div id="transaction-modal" class="modal-overlay">
    <div class="modal-container glass">
        <div class="modal-header">
            <h3 class="modal-title">Nova Transação</h3>
            <button id="close-modal-btn" class="modal-close" aria-label="Fechar Modal">
                <i class="ri-close-line"></i>
            </button>
        </div>

        <form id="transaction-form" autocomplete="off">
            <input type="hidden" id="trans-type" value="expense">

            <div class="form-group" style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button type="button" id="btn-type-expense" class="type-btn type-btn-expense active" style="flex: 1;">Despesa</button>
                <button type="button" id="btn-type-income" class="type-btn type-btn-income" style="flex: 1;">Receita</button>
            </div>

            <div class="form-group">
                <label for="trans-desc" class="form-label">Descrição</label>
                <input type="text" id="trans-desc" class="form-input" placeholder="Ex: Aluguel, Salário" required>
            </div>

            <div class="form-group">
                <label for="trans-amount" class="form-label">Valor (R$)</label>
                <input type="number" id="trans-amount" class="form-input" placeholder="0.00" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="trans-date" class="form-label">Data</label>
                <input type="date" id="trans-date" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="trans-category" class="form-label">Categoria</label>
                <select id="trans-category" class="form-input"></select>
                <input type="text" id="trans-custom-category" class="form-input" style="display: none; margin-top: 12px;" placeholder="Qual?">
            </div>

            <div class="modal-footer">
                <button type="button" id="cancel-modal-btn" class="btn-secondary">Cancelar</button>
                <button type="submit" id="save-transaction-btn" class="btn-primary">Salvar Transação</button>
            </div>
        </form>
    </div>
</div>

    <!-- Container de Toasts -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Script Principal -->
    <script type="module" src="app.js"></script>
</body>

</html>
